# Publishes to npm via OIDC trusted publishing — no NPM_TOKEN, no 2FA prompt.
#
# One-time setup on npmjs.com → the package page → Settings → Trusted Publisher:
#   Organization or user: Dev-BestOW
#   Repository:           broken-image-reporter
#   Workflow filename:    release.yml   <- must match this file's name exactly
#
# Renaming this file breaks publishing until the npm setting is updated to match.

name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # mints the OIDC token npm exchanges for publish rights

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Trusted publishing needs npm >=11.5.1, and Node 24 bundles npm 11.x.
          # Do not upgrade npm globally here: overwriting the tool-cache npm in place
          # leaves a broken dependency tree, and `npm publish` then dies looking for
          # `sigstore` while generating provenance. This package's own floor is >=18.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm --version

      - run: npm ci

      # A tag that disagrees with package.json would publish the wrong version under
      # the right tag, and npm never lets a version number be reused.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p 'require("./package.json").version')"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "publishing $PKG"

      # prepublishOnly runs typecheck + tests, prepack rebuilds dist/ from source.
      # Provenance attestation is generated automatically under trusted publishing.
      - run: npm publish
